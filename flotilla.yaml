# codeatlas as a Flotilla plugin.
#
# `flotilla install codeatlas` pip-installs codeatlas and composes the
# contributions below into the consumer project's .claude/.
#
# See https://github.com/ocgully/codeatlas for the underlying tool.

name: codeatlas
aliases:
  - mercator   # legacy plugin name; resolves to this manifest
  - codemap    # double-legacy
version: 0.6.0
description: Layered, AI-friendly codemap CLI for agent consumption
homepage: https://github.com/ocgully/codeatlas
license: MIT
kind: tool

python_package:
  name: codeatlas
  extras: []

contributes:
  agents: plugin/agents/
  commands: plugin/commands/

# codeatlas's hooks-install path is a separate manual step (`codeatlas
# hooks install`) since it needs a real source tree to scan first.
# We do not run it on plugin install.

tags:
  - codemap
  - code-intelligence
  - ai-agents
